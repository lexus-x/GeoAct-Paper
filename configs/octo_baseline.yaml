# Euclidean Baseline + Scene-ID Backbone
# Clean experiment: tests head geometry in isolation

model:
  name: "OctoEuclideanBaseline"
  hidden_dim: 768
  freeze_backbone: false
  backbone_kind: "scene_id"
  n_tasks: 2

training:
  learning_rate: 1.0e-4
  weight_decay: 1.0e-5
  batch_size: 32
  n_epochs: 50
  gradient_clip_norm: 1.0

data:
  n_train_per_family: 2500
  n_val_per_family: 250
  image_size: [224, 224]

logging:
  save_interval: 25
  checkpoint_dir: "checkpoints/"
